name: Node CI

on:
  push:
    branches: [ main, feat/workflows ]
  pull_request:
    branches: [ main ]

jobs:
  test-and-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run format
        run: npm run format

      - name: Run lint
        run: npm run lint

      - name: Run test
        run: npm run test

      - name: Run build
        run: npm run build